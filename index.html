<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>

    <!--Font Montserrat-->
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <h1 class="catalog-header">katalog</h1>

            <div class="bottom">

                    <svg class="icon" viewBox="0 0 24 24">
                        <circle class="circle" cx="12" cy="12" r="10" stroke=#032954 fill="none" stroke-width="0.8"/>
                        <path d="M10 8l4 4-4 4" stroke=#032954 fill="none" stroke-width="0.8"/>
                    </svg>
                    <p class="view-all-text">Zobacz Wszystko</p>
                </button>
            </div>
        </div>

        <div>
            <button>
                <img>
                <h2>Zestaw padów dla szlifowania gładzi <span>95 zl</span></h2>
            </button>
        </div>
    </div>


    <footer>
        <h3>My w mediach społecznościowych</h3>
        <img>
        <img>
        <img>
        <img>
